<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <title>Nope Privacy</title>
    <meta name="description" content="Anonymous real-time chat. No account. No trace. End-to-end encrypted." />
    <meta name="theme-color" content="#7c6af7" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nope Privacy" />
    <meta property="og:description" content="Chat privacy, bảo mật tuyệt đối." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://nhie.yennhie.site/preview.png" />
    <meta property="og:url" content="https://nhie.yennhie.site" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nope Privacy" />
    <meta name="twitter:description" content="Chat ẩn danh, bảo mật tuyệt đối. Không tài khoản, không lưu vết." />
    <meta name="twitter:image" content="https://nhie.yennhie.site/preview.png" />

    <!-- PWA / Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nope" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/ghost.svg" />
    <link rel="apple-touch-icon" href="/avatar.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ Service Worker registered'))
            .catch(err => console.log('❌ Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
